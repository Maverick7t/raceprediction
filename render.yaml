# render.yaml
#
# Render Blueprint — defines the service declaratively.
# Commit this file; Render reads it on first connect and on each deploy.
#
# To connect: Render Dashboard → New → Blueprint → point to this repo.
#
# Env vars marked `sync: false` must be set manually in the Render dashboard
# (they are secrets that should never appear in source control).

services:
  - type: web
    name: f1-prediction-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .

    # Render free tier — upgrade to `starter` ($7/mo) when you need
    # always-on (no spin-down) or more memory.
    plan: free

    # Health check: Render will not route traffic until this returns 200.
    # Must match the HEALTHCHECK in the Dockerfile.
    healthCheckPath: /api/v1/health

    # Zero-downtime deploys: old instance stays live until new one is healthy.
    # This is automatic on Render paid plans; on free it's best-effort.

    envVars:
      - key: ENVIRONMENT
        value: prod

      - key: LOG_LEVEL
        value: INFO

      - key: FASTF1_CACHE_DIR
        value: /tmp/fastf1_cache

      - key: ERGAST_BASE_URL
        value: https://api.jolpi.ca/ergast/f1

      - key: OPENF1_BASE_URL
        value: https://api.openf1.org/v1

      - key: MODELS_DIR
        value: models

      # Secrets — set these manually in the Render dashboard
      # (Dashboard → service → Environment → Add Environment Variable)
      - key: DATABASE_URL
        sync: false   # required — Supabase pooler URL (port 6543)

      - key: SENTRY_DSN
        sync: false   # optional — leave blank to disable Sentry

      - key: BETTERSTACK_TOKEN
        sync: false   # optional — leave blank to disable log shipping

      - key: API_SECRET_KEY
        sync: false   # optional — required to use write endpoints in prod

      - key: FRONTEND_URL
        sync: false   # required in prod — your Vercel domain