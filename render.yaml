# render.yaml — Render Blueprint
# Deploy by connecting your GitHub repo to Render and pointing at this file.
# https://render.com/docs/blueprint-spec
#
# All secret values use sync:false — set them manually in:
#   Render Dashboard → your service → Environment

services:
  - type: web
    name: f1-prediction-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend

    # Free tier — upgrade to $7/month for persistent disk if you need
    # local MLflow or model caching between deploys.
    plan: free

    # Render sets PORT automatically; our Dockerfile EXPOSE and CMD use it.
    healthCheckPath: /api/v1/health

    # Zero-downtime deploy: old instance keeps serving until new one is healthy.
    envVars:
      # ---- Required: set these in Render Dashboard ----
      - key: DATABASE_URL
        sync: false           # Supabase Transaction Pooler URL

      - key: SUPABASE_URL
        sync: false           # https://[ref].supabase.co

      - key: SUPABASE_SERVICE_KEY
        sync: false           # service_role JWT from Supabase Settings → API

      - key: API_SECRET_KEY
        sync: false           # random 32-char hex for write endpoint auth

      - key: FRONTEND_URL
        sync: false           # https://your-app.vercel.app

      - key: SENTRY_DSN
        sync: false

      - key: BETTERSTACK_TOKEN
        sync: false

      # ---- Render sets these automatically ----
      - key: PORT
        value: "8000"

      # ---- Non-secret config ----
      - key: ENVIRONMENT
        value: prod

      - key: LOG_LEVEL
        value: INFO

      - key: MODELS_DIR
        value: models

      - key: MODEL_STORAGE_BUCKET
        value: models

      - key: ERGAST_BASE_URL
        value: https://api.jolpi.ca/ergast/f1

      - key: OPENF1_BASE_URL
        value: https://api.openf1.org/v1

      - key: FASTF1_CACHE_DIR
        value: /tmp/fastf1_cache

      - key: MLFLOW_TRACKING_URI
        value: mlruns