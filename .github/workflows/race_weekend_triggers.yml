# .github/workflows/race_weekend_triggers.yml
#
# Manually-triggered (workflow_dispatch) jobs that fire the Prefect pipeline
# for each race weekend event.  Two jobs:
#
#   post_qualifying  — run after Saturday qualifying (fires post_qualifying_flow)
#   post_race        — run after Sunday race        (fires post_race_flow)
#
# HOW TO TRIGGER:
#   GitHub UI:  Actions → "Race Weekend Triggers" → Run workflow → fill inputs
#   GitHub CLI: gh workflow run race_weekend_triggers.yml \
#                 -f event=post_qualifying -f year=2025 -f round=8
#
# Required GitHub Secrets:
#   PREFECT_API_KEY     — Prefect Cloud API key
#   PREFECT_ACCOUNT_ID  — Prefect Cloud account UUID
#   PREFECT_WORKSPACE_ID — Prefect Cloud workspace UUID
#
# Deployment names (set when you register flows in Prefect Cloud):
#   post-qualifying-ingestion/default
#   post-race-ingestion/default
#
# Both jobs are idempotent — safe to run twice for the same round.

name: Race Weekend Triggers

on:
  workflow_dispatch:
    inputs:
      event:
        description: "Which event to trigger"
        required: true
        type: choice
        options:
          - post_qualifying
          - post_race
      year:
        description: "Championship year (e.g. 2025)"
        required: true
        type: string
      round:
        description: "Race round number (e.g. 8)"
        required: true
        type: string

jobs:
  # --------------------------------------------------------------------------
  trigger_prefect_flow:
    name: Trigger Prefect flow — ${{ inputs.event }} y=${{ inputs.year }} r=${{ inputs.round }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve deployment name
        id: resolve
        run: |
          if [ "${{ inputs.event }}" = "post_qualifying" ]; then
            echo "deployment=post-qualifying-ingestion/default" >> $GITHUB_OUTPUT
            echo "flow_label=Post-Qualifying Ingestion" >> $GITHUB_OUTPUT
          else
            echo "deployment=post-race-ingestion/default" >> $GITHUB_OUTPUT
            echo "flow_label=Post-Race Ingestion" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Prefect deployment
        run: |
          FLOW_NAME=$(echo "${{ steps.resolve.outputs.deployment }}" | cut -d'/' -f1)
          DEPLOYMENT_NAME=$(echo "${{ steps.resolve.outputs.deployment }}" | cut -d'/' -f2-)

          PREFECT_BASE_URL="https://api.prefect.cloud/api/accounts/${{ secrets.PREFECT_ACCOUNT_ID }}/workspaces/${{ secrets.PREFECT_WORKSPACE_ID }}"
          AUTH_HEADER="Authorization: Bearer ${{ secrets.PREFECT_API_KEY }}"

          echo "Resolving Prefect deployment: ${FLOW_NAME}/${DEPLOYMENT_NAME}"
          DEPLOYMENT_STATUS=$(curl -sS -o deployment.json -w "%{http_code}" \
            -H "$AUTH_HEADER" \
            -H "Content-Type: application/json" \
            "${PREFECT_BASE_URL}/deployments/name/${FLOW_NAME}/${DEPLOYMENT_NAME}")

          echo "Deployment lookup HTTP status: $DEPLOYMENT_STATUS"
          echo "Deployment lookup response:"
          cat deployment.json

          if [ "$DEPLOYMENT_STATUS" != "200" ]; then
            echo "Failed to resolve Prefect deployment — HTTP $DEPLOYMENT_STATUS"
            exit 1
          fi

          DEPLOYMENT_ID=$(python3 -c "import json; print(json.load(open('deployment.json')).get('id',''))")
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Prefect deployment lookup succeeded but returned no 'id'"
            exit 1
          fi

          echo "Resolved deployment id: $DEPLOYMENT_ID"

          YEAR="${{ inputs.year }}"
          ROUND_NUMBER="${{ inputs.round }}"
          FLOW_RUN_NAME="gh-actions-${{ inputs.event }}-y${{ inputs.year }}-r${{ inputs.round }}"
          export YEAR ROUND_NUMBER FLOW_RUN_NAME
          PAYLOAD=$(python3 - <<'PY'
import json
import os

year = int(os.environ["YEAR"])
round_number = int(os.environ["ROUND_NUMBER"])
name = os.environ["FLOW_RUN_NAME"]

print(
    json.dumps(
        {
            "parameters": {"year": year, "round_number": round_number},
            "name": name,
        }
    )
)
PY
          )

          CREATE_STATUS=$(curl -sS -o create_flow_run.json -w "%{http_code}" \
            -X POST \
            -H "$AUTH_HEADER" \
            -H "Content-Type: application/json" \
            "${PREFECT_BASE_URL}/deployments/${DEPLOYMENT_ID}/create_flow_run" \
            -d "$PAYLOAD")

          echo "Create flow run HTTP status: $CREATE_STATUS"
          echo "Create flow run response:"
          cat create_flow_run.json

          if [ "$CREATE_STATUS" != "201" ] && [ "$CREATE_STATUS" != "200" ]; then
            echo "Failed to create flow run — HTTP $CREATE_STATUS"
            exit 1
          fi

          FLOW_RUN_ID=$(python3 -c "import json; print(json.load(open('create_flow_run.json')).get('id','unknown'))")
          echo "Flow run created: id=$FLOW_RUN_ID"
          echo "View at: https://app.prefect.cloud/flow-runs/flow-run/$FLOW_RUN_ID"

      - name: Summary
        run: |
          echo "### Race Weekend Trigger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Event | ${{ inputs.event }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Year | ${{ inputs.year }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Round | ${{ inputs.round }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flow | ${{ steps.resolve.outputs.flow_label }} |" >> $GITHUB_STEP_SUMMARY