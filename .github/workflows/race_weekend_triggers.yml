# .github/workflows/race_weekend_triggers.yml
#
# Manually-triggered (workflow_dispatch) jobs that fire the Prefect pipeline
# for each race weekend event.  Two jobs:
#
#   post_qualifying  — run after Saturday qualifying (fires post_qualifying_flow)
#   post_race        — run after Sunday race        (fires post_race_flow)
#
# HOW TO TRIGGER:
#   GitHub UI:  Actions → "Race Weekend Triggers" → Run workflow → fill inputs
#   GitHub CLI: gh workflow run race_weekend_triggers.yml \
#                 -f event=post_qualifying -f year=2025 -f round=8
#
# Required GitHub Secrets:
#   PREFECT_API_KEY     — Prefect Cloud API key
#   PREFECT_ACCOUNT_ID  — Prefect Cloud account UUID
#   PREFECT_WORKSPACE_ID — Prefect Cloud workspace UUID
#
# Deployment names (set when you register flows in Prefect Cloud):
#   post-qualifying-ingestion/default
#   post-race-ingestion/default
#
# Both jobs are idempotent — safe to run twice for the same round.

name: Race Weekend Triggers

on:
  workflow_dispatch:
    inputs:
      event:
        description: "Which event to trigger"
        required: true
        type: choice
        options:
          - post_qualifying
          - post_race
      year:
        description: "Championship year (e.g. 2025)"
        required: true
        type: string
      round:
        description: "Race round number (e.g. 8)"
        required: true
        type: string

jobs:
  # --------------------------------------------------------------------------
  trigger_prefect_flow:
    name: Trigger Prefect flow — ${{ inputs.event }} y=${{ inputs.year }} r=${{ inputs.round }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve deployment name
        id: resolve
        run: |
          if [ "${{ inputs.event }}" = "post_qualifying" ]; then
            echo "deployment=post-qualifying-ingestion/default" >> $GITHUB_OUTPUT
            echo "flow_label=Post-Qualifying Ingestion" >> $GITHUB_OUTPUT
          else
            echo "deployment=post-race-ingestion/default" >> $GITHUB_OUTPUT
            echo "flow_label=Post-Race Ingestion" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Prefect deployment
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.PREFECT_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.prefect.cloud/api/accounts/${{ secrets.PREFECT_ACCOUNT_ID }}/workspaces/${{ secrets.PREFECT_WORKSPACE_ID }}/deployments/name/${{ steps.resolve.outputs.deployment }}/create_flow_run" \
            -d '{
              "parameters": {
                "year": ${{ inputs.year }},
                "round_number": ${{ inputs.round }}
              },
              "name": "gh-actions-${{ inputs.event }}-y${{ inputs.year }}-r${{ inputs.round }}"
            }')

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "Failed to trigger Prefect flow — HTTP $HTTP_STATUS"
            exit 1
          fi

          FLOW_RUN_ID=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin).get('id','unknown'))")
          echo "Flow run created: id=$FLOW_RUN_ID"
          echo "View at: https://app.prefect.cloud/flow-runs/flow-run/$FLOW_RUN_ID"

      - name: Summary
        run: |
          echo "### Race Weekend Trigger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Event | ${{ inputs.event }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Year | ${{ inputs.year }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Round | ${{ inputs.round }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flow | ${{ steps.resolve.outputs.flow_label }} |" >> $GITHUB_STEP_SUMMARY