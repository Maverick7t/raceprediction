# .github/workflows/race_weekend_triggers.yml
#
# Manually-triggered (workflow_dispatch) jobs that run the Prefect pipeline
# for each race weekend event.
#
# Prefect Cloud hybrid/push work pools can be blocked on free tier in Prefect 3.
# This workflow runs flows in local/ephemeral mode on the GitHub runner instead
# (no Prefect Cloud API calls, no work pools).
#
#   post_qualifying  — run after Saturday qualifying (fires post_qualifying_flow)
#   post_race        — run after Sunday race        (fires post_race_flow)
#
# HOW TO TRIGGER:
#   GitHub UI:  Actions → "Race Weekend Triggers" → Run workflow → fill inputs
#   GitHub CLI: gh workflow run race_weekend_triggers.yml \
#                 -f event=post_qualifying -f year=2025 -f round=8
#
# Required GitHub Secrets (for the flow to talk to prod services):
#   DATABASE_URL          — Supabase Postgres connection string
#   SUPABASE_SERVICE_KEY  — Supabase service role key
#   SENTRY_DSN            — Sentry project DSN
#   BETTERSTACK_TOKEN     — Better Stack (Logtail) source token
#
# Both jobs are idempotent — safe to run twice for the same round.

name: Race Weekend Triggers

on:
  workflow_dispatch:
    inputs:
      event:
        description: "Which event to trigger"
        required: true
        type: choice
        options:
          - post_qualifying
          - post_race
      year:
        description: "Championship year (e.g. 2025)"
        required: true
        type: string
      round:
        description: "Race round number (e.g. 8)"
        required: true
        type: string

jobs:
  # --------------------------------------------------------------------------
  trigger_prefect_flow:
    name: Trigger Prefect flow — ${{ inputs.event }} y=${{ inputs.year }} r=${{ inputs.round }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Resolve flow module
        id: resolve
        run: |
          if [ "${{ inputs.event }}" = "post_qualifying" ]; then
            echo "module=workers.flows.post_qualifying_flow" >> $GITHUB_OUTPUT
            echo "flow_label=Post-Qualifying Ingestion" >> $GITHUB_OUTPUT
          else
            echo "module=workers.flows.post_race_flow" >> $GITHUB_OUTPUT
            echo "flow_label=Post-Race Ingestion" >> $GITHUB_OUTPUT
          fi

      - name: Run flow (local/ephemeral Prefect)
        working-directory: backend
        run: |
          python -m "${{ steps.resolve.outputs.module }}" "${{ inputs.year }}" "${{ inputs.round }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          BETTERSTACK_TOKEN: ${{ secrets.BETTERSTACK_TOKEN }}
          ENVIRONMENT: prod
          LOG_LEVEL: INFO

      - name: Summary
        run: |
          echo "### Race Weekend Trigger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Event | ${{ inputs.event }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Year | ${{ inputs.year }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Round | ${{ inputs.round }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flow | ${{ steps.resolve.outputs.flow_label }} |" >> $GITHUB_STEP_SUMMARY