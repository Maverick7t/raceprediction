name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.0

      - name: Ruff lint
        run: ruff check app workers scripts tests

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirement.txt ]; then
            pip install -r requirement.txt
          else
            echo "No requirements file found"
            exit 1
          fi

          pip install pytest

      - name: Verify pytest
        run: python -m pytest --version

      - name: Run unit tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENVIRONMENT: dev
          LOG_LEVEL: WARNING
        run: python -m pytest tests/unit -v --tb=short

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys")

          echo "HTTP $HTTP_CODE"
          cat response.txt

          test "$HTTP_CODE" = "200" -o "$HTTP_CODE" = "201"

      - name: Wait for deploy health
        run: |
          echo "Waiting for deploy to become healthy..."

          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://f1-prediction-api.onrender.com/api/v1/health" || true)

            if [ "$STATUS" = "200" ]; then
              echo "Deploy healthy after ${i} attempts"
              exit 0
            fi

            echo "Attempt $i/24 — got HTTP $STATUS"
            sleep 15
          done

          echo "Deploy health check timed out"
          exit 1